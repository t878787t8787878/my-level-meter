<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>日文滑動鍵盤極限特訓 - 逐字判定版</title>
    <style>
        /* 使用 dvh 確保在手機鍵盤彈出時，畫面依然能完美適應剩餘空間 */
        body {
            margin: 0; padding: 0;
            background-color: #111; color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column;
            height: 100dvh; 
            touch-action: none; /* 防止畫面被手動上下滑動 */
        }

        #game-screen {
            flex: 1; position: relative;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, #2a2a35 0%, #000 100%);
            overflow: hidden; perspective: 1000px;
        }

        /* 題目容器的動畫設定 */
        #word-container {
            position: absolute;
            display: flex; flex-direction: column; align-items: center;
            transform: scale(0.1) translateZ(-500px);
            opacity: 0;
        }

        .approaching { animation: zoomIn 10s linear forwards; }

        /* 考慮到鍵盤空間，稍微縮小最終放大的比例 */
        @keyframes zoomIn {
            0% { transform: scale(0.1) translateZ(-500px); opacity: 0; }
            10% { opacity: 1; }
            90% { transform: scale(1.5) translateZ(100px); opacity: 1; }
            100% { transform: scale(1.8) translateZ(200px); opacity: 0; }
        }

        /* 漢字顯示區 */
        #kanji-display {
            font-size: 2.5rem;
            color: #ccc;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px #000;
        }

        /* 假名顯示區 (玩家互動的重點) */
        #kana-display {
            font-size: 4rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5), 3px 3px 6px #000;
            display: flex;
            gap: 5px;
        }

        /* 單個假名的樣式 */
        .kana-char {
            display: inline-block; /* 為了讓震動動畫生效 */
            transition: color 0.1s, text-shadow 0.1s;
        }

        /* 打對的顏色 (螢光綠) */
        .kana-char.correct {
            color: #00FF00;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.8), 2px 2px 4px #000;
        }

        /* 打錯時的震動動畫 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); color: #fff; }
            20% { transform: translateX(-15px); color: #FF0000; text-shadow: 0 0 20px red; }
            40% { transform: translateX(15px); color: #FF0000; }
            60% { transform: translateX(-10px); color: #FF0000; }
            80% { transform: translateX(10px); color: #FF0000; }
        }

        .shake { animation: shake 0.4s ease-in-out; }

        #timer-bar-container { width: 100%; height: 10px; background-color: #333; z-index: 10; }
        #timer-bar { height: 100%; width: 100%; background-color: #00FF00; transition: width 1s linear, background-color 0.5s; }

        /* 隱藏的輸入框，放在畫面最左上角防止畫面被捲動 */
        #hidden-input {
            position: absolute;
            top: 0; left: 0;
            width: 1px; height: 1px;
            opacity: 0; border: none;
            /* 不要用 display: none 或 pointer-events: none，否則無法喚出鍵盤 */
        }

        /* 各種互動覆蓋層 */
        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; text-align: center; padding: 20px;
        }

        .overlay h1 { font-size: 2.5rem; color: #FFD700; margin-bottom: 20px; }
        .overlay p { font-size: 1.2rem; color: #ccc; margin-bottom: 30px; line-height: 1.5; }
        button { padding: 15px 40px; font-size: 1.5rem; border: none; border-radius: 8px; background-color: #E50914; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        button:active { transform: translateY(2px); box-shadow: none; }
        
        #resume-overlay { display: none; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        #answer-overlay { display: none; }
    </style>
</head>
<body>

    <input type="text" id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

    <div id="game-screen">
        <div id="word-container">
            <div id="kanji-display">--</div>
            <div id="kana-display"></div>
        </div>
    </div>

    <div id="timer-bar-container"><div id="timer-bar"></div></div>

    <div id="start-overlay" class="overlay">
        <h1>日文極限打字特訓</h1>
        <p>準備好你的手機日文鍵盤。<br>點擊下方按鈕後，鍵盤將自動彈出。<br>請根據出現的假名逐字輸入！</p>
        <button onclick="initGame()">開始特訓</button>
    </div>

    <div id="resume-overlay" class="overlay" onclick="resumeGame()">
        <h1>遊戲暫停</h1>
        <p>偵測到鍵盤已收起</p>
        <button>點擊畫面繼續</button>
    </div>

    <div id="answer-overlay" class="overlay">
        <h1 id="answer-text">時間到！</h1>
        <p id="answer-detail">--</p>
        <button onclick="nextWord()">下一題</button>
    </div>

    <script>
        const vocabulary = [
            { kanji: "東京", reading: "とうきょう" },
            { kanji: "地下鉄", reading: "ちかてつ" },
            { kanji: "荷物", reading: "にもつ" },
            { kanji: "苗場", reading: "なえば" },
            { kanji: "滑雪", reading: "スキー" },
            { kanji: "謎解き", reading: "なぞとき" },
            { kanji: "迷宮", reading: "めいきゅう" },
            { kanji: "暗号", reading: "あんごう" },
            { kanji: "改札口", reading: "かいさつぐち" },
            { kanji: "切符", reading: "きっぷ" },
            { kanji: "秋葉原", reading: "あきはばら" }
        ];

        let currentWordIndex = -1;
        let timerInterval;
        let timeLeft = 10;
        let targetKana = "";

        const hiddenInput = document.getElementById('hidden-input');
        const wordContainer = document.getElementById('word-container');
        const kanjiDisplay = document.getElementById('kanji-display');
        const kanaDisplay = document.getElementById('kana-display');
        const timerBar = document.getElementById('timer-bar');
        
        const startOverlay = document.getElementById('start-overlay');
        const resumeOverlay = document.getElementById('resume-overlay');
        const answerOverlay = document.getElementById('answer-overlay');
        const answerText = document.getElementById('answer-text');
        const answerDetail = document.getElementById('answer-detail');

        // 片假名轉平假名
        function toHiragana(str) {
            return str.replace(/[\u30a1-\u30f6]/g, function(match) {
                var chr = match.charCodeAt(0) - 0x60;
                return String.fromCharCode(chr);
            });
        }

        // 初始化遊戲 (使用者第一次點擊)
        function initGame() {
            startOverlay.style.display = 'none';
            hiddenInput.focus();
            nextWord();
        }

        // 恢復遊戲 (如果玩家不小心把鍵盤收起來了)
        function resumeGame() {
            resumeOverlay.style.display = 'none';
            hiddenInput.focus();
        }

        // 監聽輸入框失去焦點 (通常代表鍵盤被收起了)
        hiddenInput.addEventListener('blur', () => {
            if (startOverlay.style.display === 'none' && answerOverlay.style.display === 'none') {
                resumeOverlay.style.display = 'flex';
            }
        });

        // 核心邏輯：逐字判斷
        hiddenInput.addEventListener('input', function() {
            if (currentWordIndex === -1) return;

            let currentInput = toHiragana(hiddenInput.value);
            let matchCount = 0;

            // 1. 計算目前打對了幾個字
            for (let i = 0; i < currentInput.length; i++) {
                if (i < targetKana.length && currentInput[i] === targetKana[i]) {
                    matchCount++;
                } else {
                    break; // 遇到第一個錯字就停止計算
                }
            }

            // 2. 更新畫面上的字元顏色
            for (let i = 0; i < targetKana.length; i++) {
                const span = document.getElementById(`char-${i}`);
                if (i < matchCount) {
                    span.classList.add('correct');
                } else {
                    span.classList.remove('correct');
                }
            }

            // 3. 判斷是否全部打對 (過關)
            if (matchCount === targetKana.length) {
                hiddenInput.value = ""; // 清空準備下一題
                
                // 整個單字變綠色閃爍一下，然後進入下一題
                kanaDisplay.style.textShadow = "0 0 30px #00FF00";
                setTimeout(() => {
                    kanaDisplay.style.textShadow = "";
                    nextWord();
                }, 300);
                return;
            }

            // 4. 判斷是否有打錯字
            if (currentInput.length > matchCount) {
                // 代表在 index 為 matchCount 的地方打錯了
                if (matchCount < targetKana.length) {
                    const errorSpan = document.getElementById(`char-${matchCount}`);
                    
                    // 重新觸發震動動畫的 CSS 技巧
                    errorSpan.classList.remove('shake');
                    void errorSpan.offsetWidth; // 觸發 reflow
                    errorSpan.classList.add('shake');
                }

                // 【關鍵】自動刪除玩家打錯的那個字！
                // 這樣玩家不需要按 Backspace，只要重新輸入正確的假名即可
                hiddenInput.value = targetKana.substring(0, matchCount);
            }
        });

        function nextWord() {
            answerOverlay.style.display = 'none';
            resumeOverlay.style.display = 'none';
            hiddenInput.value = ''; 
            hiddenInput.focus();
            
            currentWordIndex = Math.floor(Math.random() * vocabulary.length);
            const currentObj = vocabulary[currentWordIndex];
            targetKana = currentObj.reading;
            
            // 設定漢字
            kanjiDisplay.textContent = currentObj.kanji;
            
            // 動態產生假名的 <span> 標籤，用來獨立控制變色和震動
            kanaDisplay.innerHTML = "";
            for (let i = 0; i < targetKana.length; i++) {
                const span = document.createElement('span');
                span.id = `char-${i}`;
                span.className = 'kana-char';
                span.textContent = targetKana[i];
                kanaDisplay.appendChild(span);
            }
            
            // 重啟逼近動畫
            wordContainer.classList.remove('approaching');
            void wordContainer.offsetWidth;
            wordContainer.classList.add('approaching');

            // 重啟計時
            timeLeft = 10;
            updateTimerBar();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerBar();
                if (timeLeft <= 0) {
                    showAnswer();
                }
            }, 1000);
        }

        function updateTimerBar() {
            const percentage = (timeLeft / 10) * 100;
            timerBar.style.width = percentage + '%';
            if (timeLeft > 5) timerBar.style.backgroundColor = '#00FF00';
            else if (timeLeft > 2) timerBar.style.backgroundColor = '#FFA500';
            else timerBar.style.backgroundColor = '#FF0000';
        }

        function showAnswer() {
            clearInterval(timerInterval);
            wordContainer.classList.remove('approaching');
            const currentObj = vocabulary[currentWordIndex];
            answerText.textContent = "時間到！";
            answerDetail.innerHTML = `正解: <span style="color:#00FF00; font-weight:bold;">${currentObj.reading}</span>`;
            answerOverlay.style.display = 'flex';
            hiddenInput.blur(); // 暫時收起鍵盤
        }
    </script>
</body>
</html>
