<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鏡頭顏色辨識測試</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }

        /* 顯示辨識結果的區塊 */
        #color-display {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            transition: background-color 0.1s;
        }

        #hex-code {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        /* 隱藏必要的視訊與畫布元素 */
        video, canvas {
            display: none;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="color-display"></div>
    <div id="hex-code">點擊按鈕開始</div>
    <button id="start-btn">開啟鏡頭辨識</button>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const colorDisplay = document.getElementById('color-display');
        const hexCode = document.getElementById('hex-code');
        const startBtn = document.getElementById('start-btn');

        startBtn.addEventListener('click', async () => {
            try {
                // 1. 請求開啟前鏡頭 (facingMode: 'user')
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' } 
                });
                video.srcObject = stream;
                startBtn.style.display = 'none'; // 開始後隱藏按鈕
                
                // 2. 開始循環辨識
                requestAnimationFrame(processFrame);
            } catch (err) {
                console.error("無法存取鏡頭: ", err);
                hexCode.innerText = "請允許鏡頭存取權限";
            }
        });

        function processFrame() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // 設定畫布尺寸與影片一致
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                // 將影片目前的畫面畫到隱藏的畫布上
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                // 3. 取得中心點座標
                const centerX = Math.floor(canvas.width / 2);
                const centerY = Math.floor(canvas.height / 2);

                // 4. 取得該像素的顏色數據 (RGBA)
                const pixel = ctx.getImageData(centerX, centerY, 1, 1).data;
                const r = pixel[0];
                const g = pixel[1];
                const b = pixel[2];

                // 轉換為 Hex 字串
                const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();

                // 5. 更新 UI
                colorDisplay.style.backgroundColor = hex;
                hexCode.innerText = hex;
            }

            // 持續執行
            requestAnimationFrame(processFrame);
        }
    </script>
</body>
</html>
