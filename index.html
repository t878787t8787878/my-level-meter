<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iPhone 日文 Flick 漸進特訓</title>
    <style>
        :root {
            --duration: 20s;
            --target-scale: 2; 
        }
        /* 新增 position: fixed 與 overscroll-behavior 徹底鎖定畫面，防止 iOS 彈性滑動干擾 */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050510; color: white; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden; touch-action: none; overscroll-behavior: none;
            position: fixed;
        }

        #visual-viewport-container {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
        }

        #tunnel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            perspective: 600px; z-index: -1;
        }
        .tunnel-grid {
            position: absolute; top: 50%; left: -50%; width: 200%; height: 200%;
            background: 
                linear-gradient(transparent 0%, rgba(0, 255, 255, 0.2) 2%, transparent 4%),
                linear-gradient(90deg, transparent 0%, rgba(0, 255, 255, 0.2) 2%, transparent 4%);
            background-size: 60px 60px;
            transform-origin: top center; transform: rotateX(80deg);
            animation: moveForward 0.4s linear infinite;
        }
        @keyframes moveForward { from { background-position: 0 0; } to { background-position: 0 60px; } }

        #word-container {
            position: relative; display: flex; flex-direction: column; align-items: center;
            z-index: 10; transform-origin: center center;
        }
        
        .approaching { animation: zoomIn var(--duration) linear forwards; }
        @keyframes zoomIn {
            0% { transform: scale(0.1); opacity: 0; }
            2% { opacity: 1; filter: drop-shadow(0 0 0px rgba(255,0,0,0)); }
            100% { transform: scale(var(--target-scale)); opacity: 1; filter: drop-shadow(0 0 30px rgba(255,0,0,0.8)); }
        }

        #kanji-display { font-size: 1.8rem; color: #888; margin-bottom: 15px; text-shadow: 2px 2px 4px #000; }
        #kana-display { display: flex; gap: 10px; }

        .char-col {
            display: flex; flex-direction: column; align-items: center;
        }

        .kana-char {
            font-size: 4rem; font-weight: bold; color: #fff; transition: all 0.2s;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2), 3px 3px 6px #000;
        }
        .kana-char.correct { color: #00FF00; text-shadow: 0 0 20px #00FF00; }
        .kana-char.active { color: #00FFFF; text-shadow: 0 0 15px #00FFFF; border-bottom: 4px solid #00FFFF; }

        .romaji-char {
            font-size: 1.2rem; font-weight: bold; color: #666; margin-top: 5px;
            transition: all 0.2s; font-family: monospace; letter-spacing: 1px;
        }
        .romaji-char.correct { color: #00FF00; text-shadow: 0 0 10px #00FF00; }
        .romaji-char.active { color: #00FFFF; text-shadow: 0 0 10px #00FFFF; }

        #flick-key-icon {
            position: absolute; bottom: 25px; left: 25px;
            width: 80px; height: 80px;
            background: rgba(20, 20, 20, 0.8); border: 2px solid #555; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15), inset 0 0 15px rgba(0,0,0,0.8);
            z-index: 60; backdrop-filter: blur(5px);
        }

        #key-main-char {
            font-size: 2.4rem; font-weight: bold; color: #fff; z-index: 2;
        }

        .arrow {
            position: absolute; font-size: 1.2rem; color: #444; font-weight: bold;
            transition: all 0.2s; font-family: 'Arial', sans-serif; z-index: 1;
        }
        
        .arrow.active-arrow { color: #1E90FF; text-shadow: 0 0 10px #1E90FF; }
        
        .arrow-up { top: 2px; left: 50%; transform: translateX(-50%); }
        .arrow-down { bottom: 2px; left: 50%; transform: translateX(-50%); }
        .arrow-left { left: 4px; top: 50%; transform: translateY(-50%); }
        .arrow-right { right: 4px; top: 50%; transform: translateY(-50%); }

        .arrow-up.active-arrow { transform: translateX(-50%) scale(1.3); }
        .arrow-down.active-arrow { transform: translateX(-50%) scale(1.3); }
        .arrow-left.active-arrow { transform: translateY(-50%) scale(1.3); }
        .arrow-right.active-arrow { transform: translateY(-50%) scale(1.3); }

        #game-stats {
            position: absolute; top: 15px; right: 20px;
            text-align: right; z-index: 50;
        }
        #score-display { font-size: 1.5rem; color: #FFD700; font-weight: bold; }
        #speed-display { font-size: 1rem; color: #00FFFF; margin-top: 5px;}

        .bullet {
            position: fixed; z-index: 40; pointer-events: none;
            width: 4px; height: 25px; border-radius: 2px;
            background-color: #00FFFF; box-shadow: 0 0 15px #00FFFF, 0 0 5px #fff;
        }

        .particle {
            position: fixed; z-index: 80; pointer-events: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); color: #ff4444; }
            75% { transform: translateX(10px); color: #ff4444; }
        }
        .shake { animation: shake 0.2s ease-in-out 2; }

        #timer-bar-container { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background-color: #222; z-index: 20;}
        /* 移除了 transition，因為現在我們透過 60fps 的 JS 動畫影格做到了完美的平滑同步 */
        #timer-bar { height: 100%; width: 100%; background-color: #00FF00; }

        #hidden-input { position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0; }

        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5,5,15,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; padding: 30px; text-align: center;
        }
        
        #resume-overlay { display: none; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }

        button {
            padding: 15px 40px; font-size: 1.4rem; border: 2px solid #00FFFF; border-radius: 50px;
            background: rgba(0,255,255,0.1); color: #00FFFF; font-weight: bold; cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <input type="text" id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" data-lpignore="true">

    <div id="visual-viewport-container">
        <div id="tunnel"><div class="tunnel-grid"></div></div>
        <div id="timer-bar-container"><div id="timer-bar"></div></div>
        
        <div id="game-stats">
            <div id="score-display">擊破數: 0</div>
            <div id="speed-display">極限倒數: 20.0s</div>
        </div>

        <div id="word-container">
            <div id="kanji-display">--</div>
            <div id="kana-display"></div>
        </div>

        <div id="flick-key-icon">
            <span class="arrow arrow-up">△</span>
            <span class="arrow arrow-down">▽</span>
            <span class="arrow arrow-left">◁</span>
            <span class="arrow arrow-right">▷</span>
            <span id="key-main-char">あ</span>
        </div>
    </div>

    <div id="resume-overlay" class="overlay">
        <h1 style="color:#FFD700">系統中斷</h1>
        <p style="color:#ccc">點擊輸入框區域以重新展開武器面板</p>
        <button onclick="resumeGame()">重新連線</button>
    </div>

    <div id="start-overlay" class="overlay">
        <h1 style="color:#00FFFF">iPhone 肌肉記憶特訓</h1>
        <p style="line-height:1.6; color:#ccc;">
            請手動切換至「日文-假名輸入」鍵盤。<br>
            單字逼近的速度與倒數時間將完全同步。<br>
            請在文字撞擊螢幕邊緣前將其擊碎！
        </p>
        <button onclick="initGame()">啟動特訓引擎</button>
    </div>

    <div id="answer-overlay" class="overlay" style="display:none">
        <h1 style="color:#ff4444">防線被突破！</h1>
        <p id="answer-detail" style="font-size:1.5rem; margin-bottom: 10px;"></p>
        <p id="final-score" style="color:#FFD700; font-size:1.2rem;"></p>
        <button onclick="resetGame()">重新部署</button>
    </div>

    <script>
        const flickMap = {
            'あ': { key: 'あ', dir: '點擊', arrow: '', romaji: 'a' }, 'い': { key: 'あ', dir: '左滑', arrow: 'left', romaji: 'i' }, 'う': { key: 'あ', dir: '上滑', arrow: 'up', romaji: 'u' }, 'え': { key: 'あ', dir: '右滑', arrow: 'right', romaji: 'e' }, 'お': { key: 'あ', dir: '下滑', arrow: 'down', romaji: 'o' },
            'か': { key: 'か', dir: '點擊', arrow: '', romaji: 'ka' }, 'き': { key: 'か', dir: '左滑', arrow: 'left', romaji: 'ki' }, 'く': { key: 'か', dir: '上滑', arrow: 'up', romaji: 'ku' }, 'け': { key: 'か', dir: '右滑', arrow: 'right', romaji: 'ke' }, 'こ': { key: 'か', dir: '下滑', arrow: 'down', romaji: 'ko' },
            'さ': { key: 'さ', dir: '點擊', arrow: '', romaji: 'sa' }, 'し': { key: 'さ', dir: '左滑', arrow: 'left', romaji: 'shi' }, 'す': { key: 'さ', dir: '上滑', arrow: 'up', romaji: 'su' }, 'せ': { key: 'さ', dir: '右滑', arrow: 'right', romaji: 'se' }, 'そ': { key: 'さ', dir: '下滑', arrow: 'down', romaji: 'so' },
            'た': { key: 'た', dir: '點擊', arrow: '', romaji: 'ta' }, 'ち': { key: 'た', dir: '左滑', arrow: 'left', romaji: 'chi' }, 'つ': { key: 'た', dir: '上滑', arrow: 'up', romaji: 'tsu' }, 'て': { key: 'た', dir: '右滑', arrow: 'right', romaji: 'te' }, 'と': { key: 'た', dir: '下滑', arrow: 'down', romaji: 'to' },
            'な': { key: 'な', dir: '點擊', arrow: '', romaji: 'na' }, 'に': { key: 'な', dir: '左滑', arrow: 'left', romaji: 'ni' }, 'ぬ': { key: 'な', dir: '上滑', arrow: 'up', romaji: 'nu' }, 'ね': { key: 'な', dir: '右滑', arrow: 'right', romaji: 'ne' }, 'の': { key: 'な', dir: '下滑', arrow: 'down', romaji: 'no' },
            'は': { key: 'は', dir: '點擊', arrow: '', romaji: 'ha' }, 'ひ': { key: 'は', dir: '左滑', arrow: 'left', romaji: 'hi' }, 'ふ': { key: 'は', dir: '上滑', arrow: 'up', romaji: 'fu' }, 'へ': { key: 'は', dir: '右滑', arrow: 'right', romaji: 'he' }, 'ほ': { key: 'は', dir: '下滑', arrow: 'down', romaji: 'ho' },
            'ま': { key: 'ま', dir: '點擊', arrow: '', romaji: 'ma' }, 'み': { key: 'ま', dir: '左滑', arrow: 'left', romaji: 'mi' }, 'む': { key: 'ま', dir: '上滑', arrow: 'up', romaji: 'mu' }, 'め': { key: 'ま', dir: '右滑', arrow: 'right', romaji: 'me' }, 'も': { key: 'ま', dir: '下滑', arrow: 'down', romaji: 'mo' },
            'や': { key: 'や', dir: '點擊', arrow: '', romaji: 'ya' }, 'ゆ': { key: 'や', dir: '上滑', arrow: 'up', romaji: 'yu' }, 'よ': { key: 'や', dir: '下滑', arrow: 'down', romaji: 'yo' }, 
            'ら': { key: 'ら', dir: '點擊', arrow: '', romaji: 'ra' }, 'り': { key: 'ら', dir: '左滑', arrow: 'left', romaji: 'ri' }, 'る': { key: 'ら', dir: '上滑', arrow: 'up', romaji: 'ru' }, 'れ': { key: 'ら', dir: '右滑', arrow: 'right', romaji: 're' }, 'ろ': { key: 'ら', dir: '下滑', arrow: 'down', romaji: 'ro' },
            'わ': { key: 'わ', dir: '點擊', arrow: '', romaji: 'wa' }, 'を': { key: 'わ', dir: '左滑', arrow: 'left', romaji: 'wo' }, 'ん': { key: 'わ', dir: '上滑', arrow: 'up', romaji: 'n' },
            'ー': { key: 'わ', dir: '右滑', arrow: 'right', romaji: '-' },
            'ゃ': { key: 'や', dir: '點擊', arrow: '', romaji: 'ya' }, 'ゅ': { key: 'や', dir: '上滑', arrow: 'up', romaji: 'yu' }, 'ょ': { key: 'や', dir: '下滑', arrow: 'down', romaji: 'yo' }, 'っ': { key: 'た', dir: '上滑', arrow: 'up', romaji: 'tsu' }
        };

        const vocabulary = [
            { kanji: "壽司", reading: "すし" }, { kanji: "拉麵", reading: "らーめん" }, { kanji: "車站", reading: "えき" },
            { kanji: "地下鐵", reading: "ちかてつ" }, { kanji: "藥", reading: "くすり" }, { kanji: "行李", reading: "にもつ" }, 
            { kanji: "飯店", reading: "ほてる" }, { kanji: "滑雪", reading: "すきー" }, { kanji: "東京", reading: "とうきょう" },
            { kanji: "肉", reading: "にく" }, { kanji: "相機", reading: "かめら" }, { kanji: "雨傘", reading: "かさ" },
            { kanji: "秋", reading: "あき" }, { kanji: "切符", reading: "きっぷ" }, { kanji: "春天", reading: "はる" },
            { kanji: "夏天", reading: "なつ" }, { kanji: "冬天", reading: "ふゆ" }, { kanji: "早安", reading: "おはよう" },
            { kanji: "機票", reading: "ちけっと" }, { kanji: "貓", reading: "ねこ" }, { kanji: "狗", reading: "いぬ" },
            { kanji: "秘密", reading: "ひみつ" }, { kanji: "寺廟", reading: "てら" }, { kanji: "橋", reading: "はし" }
        ];

        let currentWordIndex = -1;
        
        // 核心計時引擎更新為 requestAnimationFrame，告別飄移誤差
        let animationFrameId;
        let lastTime = 0;
        
        let currentDuration = 20; 
        let timeLeft = 20;
        let targetKana = "";
        let matchCount = 0;
        let score = 0;

        const hiddenInput = document.getElementById('hidden-input');
        const vpContainer = document.getElementById('visual-viewport-container');
        const kanaDisplay = document.getElementById('kana-display');
        const keyMainChar = document.getElementById('key-main-char');
        const wordContainer = document.getElementById('word-container');
        const rootStyles = document.documentElement;
        
        const startOverlay = document.getElementById('start-overlay');
        const answerOverlay = document.getElementById('answer-overlay');
        const resumeOverlay = document.getElementById('resume-overlay');

        function resizeLayout() {
            if (window.visualViewport) {
                vpContainer.style.height = window.visualViewport.height + 'px';
                vpContainer.style.top = window.visualViewport.offsetTop + 'px';
                
                // 動態判斷鍵盤狀態以暫停/恢復遊戲計時
                if (window.visualViewport.height >= window.innerHeight * 0.85) {
                    if (startOverlay.style.display === 'none' && answerOverlay.style.display === 'none' && resumeOverlay.style.display !== 'flex') {
                        resumeOverlay.style.display = 'flex';
                        cancelAnimationFrame(animationFrameId); // 暫停計時
                        wordContainer.style.animationPlayState = 'paused';
                    }
                } else {
                    if (resumeOverlay.style.display === 'flex') {
                        resumeOverlay.style.display = 'none';
                        lastTime = 0; // 重置時間戳記
                        animationFrameId = requestAnimationFrame(runTimer); // 自動恢復計時
                        wordContainer.style.animationPlayState = 'running';
                    }
                }
            }
        }
        window.visualViewport.addEventListener('resize', resizeLayout);

        function toHiragana(str) {
            return str.replace(/[\u30a1-\u30f6]/g, m => String.fromCharCode(m.charCodeAt(0) - 0x60));
        }

        function initGame() {
            startOverlay.style.display = 'none';
            score = 0;
            currentDuration = 20;
            updateStats();
            hiddenInput.focus();
            nextWord();
        }

        function resetGame() {
            answerOverlay.style.display = 'none';
            initGame();
        }

        function resumeGame() {
            resumeOverlay.style.display = 'none';
            hiddenInput.focus();
            lastTime = 0;
            animationFrameId = requestAnimationFrame(runTimer);
            wordContainer.style.animationPlayState = 'running';
        }

        function updateStats() {
            document.getElementById('score-display').textContent = `擊破數: ${score}`;
            currentDuration = Math.max(4, 20 - (score * 0.5));
            document.getElementById('speed-display').textContent = `極限倒數: ${currentDuration.toFixed(1)}s`;
            rootStyles.style.setProperty('--duration', currentDuration + 's');
        }

        function updateFlickHint() {
            const char = targetKana[matchCount];
            const hiraChar = toHiragana(char); 
            const hint = flickMap[hiraChar] || { key: '?', arrow: '' };

            keyMainChar.textContent = hint.key;

            const arrowElements = {
                'up': { el: document.querySelector('.arrow-up'), hollow: '△', solid: '▲\uFE0E' },
                'down': { el: document.querySelector('.arrow-down'), hollow: '▽', solid: '▼\uFE0E' },
                'left': { el: document.querySelector('.arrow-left'), hollow: '◁', solid: '◀\uFE0E' },
                'right': { el: document.querySelector('.arrow-right'), hollow: '▷', solid: '▶\uFE0E' }
            };

            for (let dir in arrowElements) {
                arrowElements[dir].el.textContent = arrowElements[dir].hollow;
                arrowElements[dir].el.classList.remove('active-arrow');
            }

            if (hint.arrow && arrowElements[hint.arrow]) {
                arrowElements[hint.arrow].el.textContent = arrowElements[hint.arrow].solid;
                arrowElements[hint.arrow].el.classList.add('active-arrow');
            }
        }

        hiddenInput.addEventListener('input', function() {
            let inputVal = toHiragana(hiddenInput.value);
            if (inputVal.length === 0) return;
            
            let lastChar = inputVal[inputVal.length - 1];
            let targetChar = toHiragana(targetKana[matchCount]);

            if (lastChar === targetChar || (targetChar === 'っ' && lastChar !== 'っ')) {
                fireLaser(matchCount);
                matchCount++;
                
                hiddenInput.value = ''; // 正確時清空
                
                document.querySelectorAll('.kana-char').forEach((s, idx) => {
                    if (idx < matchCount) s.className = 'kana-char correct';
                    else if (idx === matchCount) s.className = 'kana-char active';
                    else s.className = 'kana-char';
                });

                document.querySelectorAll('.romaji-char').forEach((s, idx) => {
                    if (idx < matchCount) s.className = 'romaji-char correct';
                    else if (idx === matchCount) s.className = 'romaji-char active';
                    else s.className = 'romaji-char';
                });

                if (matchCount === targetKana.length) {
                    score++;
                    updateStats();
                    setTimeout(clearAndExplode, 150); 
                } else {
                    updateFlickHint();
                }
            } else {
                const errorSpan = document.getElementById(`char-${matchCount}`);
                errorSpan.classList.remove('shake');
                void errorSpan.offsetWidth;
                errorSpan.classList.add('shake');
                
                // 為了讓你能順利敲出濁音/半濁音 (゛/゜)，錯誤時我們必須保留你的輸入字元在底層
                // 這也是為什麼 iOS 系統一定會觸發預測選字的根本原因。
                hiddenInput.value = lastChar;
            }
        });

        function createParticles(x, y, color, count = 12) {
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundColor = color;
                p.style.boxShadow = `0 0 8px ${color}`;
                p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                
                const size = 3 + Math.random() * 5;
                p.style.width = size + 'px'; p.style.height = size + 'px';
                p.style.left = x + 'px'; p.style.top = y + 'px';
                document.body.appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 50 + Math.random() * 120; 
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                p.animate([
                    { transform: 'translate(-50%, -50%) rotate(0deg) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) rotate(${Math.random() * 360}deg) scale(0)`, opacity: 0 }
                ], { duration: 300 + Math.random() * 300, easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)' }).onfinish = () => p.remove();
            }
        }

        function fireLaser(idx) {
            const bullet = document.createElement('div');
            bullet.className = 'bullet';
            
            const startY = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            const startX = window.visualViewport ? window.visualViewport.width / 2 : window.innerWidth / 2;
            document.body.appendChild(bullet);

            const targetEl = document.getElementById(`char-${idx}`);
            const rect = targetEl.getBoundingClientRect();
            const targetX = rect.left + rect.width / 2;
            const targetY = rect.top + rect.height / 2;

            const animation = bullet.animate([
                { transform: `translate(-50%, -50%) scaleY(1)`, top: `${startY}px`, left: `${startX}px` },
                { transform: `translate(-50%, -50%) scaleY(1.5)`, top: `${targetY}px`, left: `${targetX}px` }
            ], { duration: 60, easing: 'linear' });

            animation.onfinish = () => {
                bullet.remove();
                createParticles(targetX, targetY, '#00FF00', 15); 
                targetEl.animate([
                    { filter: 'brightness(3) drop-shadow(0 0 20px #00FF00)', transform: 'scale(1.4)' },
                    { filter: 'brightness(1) drop-shadow(0 0 10px rgba(255, 255, 255, 0.2))', transform: 'scale(1.1)' }
                ], { duration: 250, easing: 'ease-out' });
            };
        }

        function clearAndExplode() {
            cancelAnimationFrame(animationFrameId);
            const computedStyle = window.getComputedStyle(wordContainer);
            const currentTransform = computedStyle.transform;
            
            wordContainer.style.animation = 'none';
            
            wordContainer.animate([
                { transform: currentTransform, filter: 'brightness(2)', opacity: 1 },
                { transform: `${currentTransform} scale(1.5)`, filter: 'brightness(1)', opacity: 0 }
            ], { duration: 300, easing: 'ease-out', fill: 'forwards' });
            
            const rect = wordContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            for(let i = 0; i < 40; i++) {
                createParticles(
                    centerX + (Math.random() * 60 - 30), centerY + (Math.random() * 40 - 20), 
                    Math.random() > 0.5 ? '#00FFFF' : '#00FF00', 1
                );
            }
            setTimeout(nextWord, 350);
        }

        // 精準的螢幕刷新率驅動計時器
        function runTimer(currentTime) {
            if (!lastTime) lastTime = currentTime;
            let deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            timeLeft -= deltaTime;
            updateTimerBar();

            if (timeLeft <= 0) {
                timeLeft = 0;
                updateTimerBar();
                showAnswer();
            } else {
                animationFrameId = requestAnimationFrame(runTimer);
            }
        }

        function updateTimerBar() {
            const p = Math.max(0, (timeLeft / currentDuration) * 100);
            document.getElementById('timer-bar').style.width = p + '%';
            document.getElementById('timer-bar').style.backgroundColor = p < 30 ? '#ff4444' : '#00FF00';
        }

        function nextWord() {
            // 強制清除之前所有的 Web Animations 動畫殘留，避免 iOS Safari 渲染 Bug 導致文字消失
            if (typeof wordContainer.getAnimations === 'function') {
                wordContainer.getAnimations().forEach(anim => anim.cancel());
            }
            
            wordContainer.style.animation = 'none';
            wordContainer.className = '';
            
            hiddenInput.value = ''; matchCount = 0;
            hiddenInput.focus();

            currentWordIndex = Math.floor(Math.random() * vocabulary.length);
            const word = vocabulary[currentWordIndex];
            targetKana = word.reading;

            document.getElementById('kanji-display').textContent = word.kanji;
            
            kanaDisplay.innerHTML = targetKana.split('').map((c, i) => {
                const hint = flickMap[toHiragana(c)] || { romaji: '?' };
                return `
                <div class="char-col" id="col-${i}">
                    <div id="char-${i}" class="kana-char ${i===0?'active':''}">${c}</div>
                    <div id="romaji-${i}" class="romaji-char ${i===0?'active':''}">${hint.romaji.toUpperCase()}</div>
                </div>`;
            }).join('');

            updateFlickHint();

            void wordContainer.offsetWidth; 
            
            let baseWidth = wordContainer.offsetWidth;
            let maxWidth = window.innerWidth * 0.95; 
            let scaleFactor = baseWidth > 0 ? maxWidth / baseWidth : 1.5;
            scaleFactor = Math.min(scaleFactor, 3.5); 
            
            rootStyles.style.setProperty('--target-scale', scaleFactor);
            wordContainer.className = 'approaching';

            timeLeft = currentDuration;
            updateTimerBar();
            
            lastTime = 0;
            cancelAnimationFrame(animationFrameId);
            animationFrameId = requestAnimationFrame(runTimer);
        }

        function showAnswer() {
            cancelAnimationFrame(animationFrameId);
            wordContainer.style.animationPlayState = 'paused'; 
            
            document.getElementById('answer-detail').innerHTML = `讀音：<b style="color:#00FF00">${targetKana}</b>`;
            document.getElementById('final-score').textContent = `本次特訓擊破數：${score}`;
            answerOverlay.style.display = 'flex';
            hiddenInput.blur();
        }

        resizeLayout();
    </script>
</body>
</html>
