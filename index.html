<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>日文 Flick 肌肉記憶特訓</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #050510;
            color: white; font-family: 'Arial', sans-serif;
            overflow: hidden; touch-action: none;
        }

        #visual-viewport-container {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* 3D 隧道背景 */
        #tunnel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            perspective: 600px; z-index: -1;
        }
        .tunnel-grid {
            position: absolute; top: 50%; left: -50%; width: 200%; height: 200%;
            background: 
                linear-gradient(transparent 0%, rgba(0, 255, 255, 0.2) 2%, transparent 4%),
                linear-gradient(90deg, transparent 0%, rgba(0, 255, 255, 0.2) 2%, transparent 4%);
            background-size: 60px 60px;
            transform-origin: top center; transform: rotateX(80deg);
            animation: moveForward 0.4s linear infinite;
        }
        @keyframes moveForward { from { background-position: 0 0; } to { background-position: 0 60px; } }

        /* 題目容器 */
        #word-container {
            position: relative; display: flex; flex-direction: column; align-items: center;
            transform-style: preserve-3d; margin-top: -50px;
        }
        .approaching { animation: zoomIn 12s linear forwards; }
        @keyframes zoomIn {
            0% { transform: scale(0.1) translateY(-200px); opacity: 0; }
            5% { opacity: 1; }
            95% { transform: scale(1.4) translateY(0px); opacity: 1; }
            100% { transform: scale(1.6) translateY(50px); opacity: 0; }
        }
        .exploding { animation: explode 0.3s ease-out forwards; }
        @keyframes explode {
            0% { transform: scale(1.4); filter: brightness(2); opacity: 1; }
            100% { transform: scale(2.5); filter: brightness(0); opacity: 0; }
        }

        #kanji-display { font-size: 1.8rem; color: #888; margin-bottom: 10px; }
        #kana-display { font-size: 4.5rem; font-weight: bold; color: #fff; display: flex; gap: 8px; }

        .kana-char {
            display: inline-block; transition: all 0.2s;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2), 3px 3px 6px #000;
        }
        .kana-char.correct { color: #00FF00; text-shadow: 0 0 20px #00FF00; transform: scale(1.1); }
        .kana-char.active { color: #00FFFF; text-shadow: 0 0 15px #00FFFF; border-bottom: 4px solid #00FFFF; }

        /* Flick 指引面板 */
        #flick-hint-panel {
            position: absolute; bottom: 20px;
            width: 90%; max-width: 350px;
            background: rgba(0, 20, 40, 0.8);
            border: 2px solid #00FFFF; border-radius: 15px;
            padding: 15px; display: flex; align-items: center;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            z-index: 60;
        }

        #flick-key-icon {
            width: 60px; height: 60px;
            background: #111; border: 2px solid #fff; border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.8rem; font-weight: bold; margin-right: 20px;
            position: relative;
        }

        /* 箭頭指示 */
        .arrow {
            position: absolute; font-size: 1.5rem; color: #555;
            transition: color 0.2s, transform 0.2s;
        }
        .arrow.active-arrow { color: #FFD700; transform: scale(1.5); text-shadow: 0 0 10px #FFD700; }
        .arrow-up { top: -25px; } .arrow-down { bottom: -25px; }
        .arrow-left { left: -25px; } .arrow-right { right: -25px; }

        #flick-text-hint { flex: 1; font-size: 1.2rem; line-height: 1.4; }
        #flick-text-hint b { color: #FFD700; font-size: 1.5rem; }

        /* 其他 UI */
        .bullet {
            position: fixed; z-index: 50; font-size: 2.5rem; color: #00FFFF;
            text-shadow: 0 0 15px #00FFFF; pointer-events: none;
            transform: translate(-50%, -50%); transition: all 0.15s ease-in;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); color: #ff4444; }
            75% { transform: translateX(10px); color: #ff4444; }
        }
        .shake { animation: shake 0.2s ease-in-out 2; }

        #timer-bar-container { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background-color: #222; }
        #timer-bar { height: 100%; width: 100%; background-color: #00FF00; transition: width 1s linear; }

        #hidden-input { position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0; }

        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5,5,15,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; padding: 30px;
        }
        button {
            padding: 15px 40px; font-size: 1.4rem; border: 2px solid #00FFFF; border-radius: 50px;
            background: transparent; color: #00FFFF; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <input type="text" id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

    <div id="visual-viewport-container">
        <div id="tunnel"><div class="tunnel-grid"></div></div>
        <div id="timer-bar-container"><div id="timer-bar"></div></div>

        <div id="word-container">
            <div id="kanji-display">--</div>
            <div id="kana-display"></div>
        </div>

        <div id="flick-hint-panel">
            <div id="flick-key-icon">
                <span id="key-main-char">あ</span>
                <span class="arrow arrow-up">▲</span>
                <span class="arrow arrow-down">▼</span>
                <span class="arrow arrow-left">◀</span>
                <span class="arrow arrow-right">▶</span>
            </div>
            <div id="flick-text-hint">
                請按住 <b id="hint-key">あ</b><br>往 <b id="hint-dir">中心</b> 滑動
            </div>
        </div>
    </div>

    <div id="start-overlay" class="overlay">
        <h1 style="color:#00FFFF">Flick 肌肉記憶特訓</h1>
        <p style="text-align:center; line-height:1.6">請使用手機的「日文九宮格鍵盤」。<br>觀察下方的指引面板，<br>在單字撞上你之前擊破它們！</p>
        <button onclick="initGame()">啟動系統</button>
    </div>

    <div id="answer-overlay" class="overlay" style="display:none">
        <h1 style="color:#ff4444">撞擊！護盾受損</h1>
        <p id="answer-detail" style="font-size:1.5rem"></p>
        <button onclick="nextWord()">修復並繼續</button>
    </div>

    <script>
        // Flick 鍵盤映射表 (平假名與片假名通用)
        const flickMap = {
            'あ': { key: 'あ', dir: '中心', arrow: '' }, 'い': { key: 'あ', dir: '左', arrow: 'left' }, 'う': { key: 'あ', dir: '上', arrow: 'up' }, 'え': { key: 'あ', dir: '右', arrow: 'right' }, 'お': { key: 'あ', dir: '下', arrow: 'down' },
            'か': { key: 'か', dir: '中心', arrow: '' }, 'き': { key: 'か', dir: '左', arrow: 'left' }, 'く': { key: 'か', dir: '上', arrow: 'up' }, 'け': { key: 'か', dir: '右', arrow: 'right' }, 'こ': { key: 'か', dir: '下', arrow: 'down' },
            'さ': { key: 'さ', dir: '中心', arrow: '' }, 'し': { key: 'さ', dir: '左', arrow: 'left' }, 'す': { key: 'さ', dir: '上', arrow: 'up' }, 'せ': { key: 'さ', dir: '右', arrow: 'right' }, 'そ': { key: 'さ', dir: '下', arrow: 'down' },
            'た': { key: 'た', dir: '中心', arrow: '' }, 'ち': { key: 'た', dir: '左', arrow: 'left' }, 'つ': { key: 'た', dir: '上', arrow: 'up' }, 'て': { key: 'た', dir: '右', arrow: 'right' }, 'と': { key: 'た', dir: '下', arrow: 'down' },
            'な': { key: 'な', dir: '中心', arrow: '' }, 'に': { key: 'な', dir: '左', arrow: 'left' }, 'ぬ': { key: 'な', dir: '上', arrow: 'up' }, 'ね': { key: 'な', dir: '右', arrow: 'right' }, 'の': { key: 'な', dir: '下', arrow: 'down' },
            'は': { key: 'は', dir: '中心', arrow: '' }, 'ひ': { key: 'は', dir: '左', arrow: 'left' }, 'ふ': { key: 'は', dir: '上', arrow: 'up' }, 'へ': { key: 'は', dir: '右', arrow: 'right' }, 'ほ': { key: 'は', dir: '下', arrow: 'down' },
            'ま': { key: 'ま', dir: '中心', arrow: '' }, 'み': { key: 'ま', dir: '左', arrow: 'left' }, 'む': { key: 'ま', dir: '上', arrow: 'up' }, 'め': { key: 'ま', dir: '右', arrow: 'right' }, 'も': { key: 'ま', dir: '下', arrow: 'down' },
            'や': { key: 'や', dir: '中心', arrow: '' }, 'ゆ': { key: 'や', dir: '上', arrow: 'up' }, 'よ': { key: 'や', dir: '下', arrow: 'down' },
            'ら': { key: 'ら', dir: '中心', arrow: '' }, 'り': { key: 'ら', dir: '左', arrow: 'left' }, 'る': { key: 'ら', dir: '上', arrow: 'up' }, 'れ': { key: 'ら', dir: '右', arrow: 'right' }, 'ろ': { key: 'ら', dir: '下', arrow: 'down' },
            'わ': { key: 'わ', dir: '中心', arrow: '' }, 'を': { key: 'わ', dir: '左', arrow: 'left' }, 'ん': { key: 'わ', dir: '上', arrow: 'up' },
            'ー': { key: 'わ', dir: '右', arrow: 'right' },
            // 濁音處理：導向其母音按鍵
            'が': { key: 'か', dir: '中心', arrow: '' }, 'ぎ': { key: 'か', dir: '左', arrow: 'left' }, 'ぐ': { key: 'か', dir: '上', arrow: 'up' }, 'げ': { key: 'か', dir: '右', arrow: 'right' }, 'ご': { key: 'か', dir: '下', arrow: 'down' },
            'ざ': { key: 'さ', dir: '中心', arrow: '' }, 'じ': { key: 'さ', dir: '左', arrow: 'left' }, 'ず': { key: 'さ', dir: '上', arrow: 'up' }, 'ぜ': { key: 'さ', dir: '右', arrow: 'right' }, 'ぞ': { key: 'さ', dir: '下', arrow: 'down' },
            'だ': { key: 'た', dir: '中心', arrow: '' }, 'ぢ': { key: 'た', dir: '左', arrow: 'left' }, 'づ': { key: 'た', dir: '上', arrow: 'up' }, 'で': { key: 'た', dir: '右', arrow: 'right' }, 'ど': { key: 'た', dir: '下', arrow: 'down' },
            'ば': { key: 'は', dir: '中心', arrow: '' }, 'び': { key: 'は', dir: '左', arrow: 'left' }, 'ぶ': { key: 'は', dir: '上', arrow: 'up' }, 'べ': { key: 'は', dir: '右', arrow: 'right' }, 'ぼ': { key: 'は', dir: '下', arrow: 'down' },
            'ぱ': { key: 'は', dir: '中心', arrow: '' }, 'ぴ': { key: 'は', dir: '左', arrow: 'left' }, 'ぷ': { key: 'は', dir: '上', arrow: 'up' }, 'ぺ': { key: 'は', dir: '右', arrow: 'right' }, 'ぽ': { key: 'は', dir: '下', arrow: 'down' }
        };

        // 大量短單字題庫
        const vocabulary = [
            { kanji: "壽司", reading: "すし" }, { kanji: "拉麵", reading: "らーめん" }, { kanji: "車站", reading: "えき" },
            { kanji: "地下鐵", reading: "ちかてつ" }, { kanji: "地圖", reading: "ちず" }, { kanji: "藥妝店", reading: "くすり" },
            { kanji: "行李", reading: "にもつ" }, { kanji: "飯店", reading: "ほてる" }, { kanji: "滑雪", reading: "すきー" },
            { kanji: "東京", reading: "とうきょう" }, { kanji: "燒肉", reading: "やきにく" }, { kanji: "便利商店", reading: "こんびに" },
            { kanji: "相機", reading: "かめら" }, { kanji: "雨傘", reading: "かさ" }, { kanji: "出口", reading: "でぐち" },
            { kanji: "入口", reading: "いりぐち" }, { kanji: "改札口", reading: "かいさつ" }, { kanji: "硬幣", reading: "こいん" },
            { kanji: "廁所", reading: "といれ" }, { kanji: "秘密", reading: "ひみつ" }, { kanji: "暗號", reading: "あんごう" }
        ];

        let currentWordIndex = -1;
        let timerInterval;
        let timeLeft = 12;
        let targetKana = "";
        let matchCount = 0;

        const hiddenInput = document.getElementById('hidden-input');
        const vpContainer = document.getElementById('visual-viewport-container');
        const kanaDisplay = document.getElementById('kana-display');
        const keyMainChar = document.getElementById('key-main-char');
        const hintKey = document.getElementById('hint-key');
        const hintDir = document.getElementById('hint-dir');

        function resizeLayout() {
            if (window.visualViewport) {
                vpContainer.style.height = window.visualViewport.height + 'px';
                vpContainer.style.top = window.visualViewport.offsetTop + 'px';
            }
        }
        window.visualViewport.addEventListener('resize', resizeLayout);

        function toHiragana(str) {
            return str.replace(/[\u30a1-\u30f6]/g, m => String.fromCharCode(m.charCodeAt(0) - 0x60));
        }

        function initGame() {
            document.getElementById('start-overlay').style.display = 'none';
            hiddenInput.focus();
            nextWord();
        }

        // 更新導航提示面板
        function updateFlickHint() {
            const char = targetKana[matchCount];
            const hiraChar = toHiragana(char); // 轉換為平假名查找映射
            const hint = flickMap[hiraChar] || { key: '?', dir: '未知', arrow: '' };

            keyMainChar.textContent = hint.key;
            hintKey.textContent = hint.key;
            hintDir.textContent = hint.dir;

            // 更新箭頭顏色
            document.querySelectorAll('.arrow').forEach(a => a.classList.remove('active-arrow'));
            if (hint.arrow) {
                document.querySelector(`.arrow-${hint.arrow}`).classList.add('active-arrow');
            }
        }

        hiddenInput.addEventListener('input', function() {
            let inputVal = toHiragana(hiddenInput.value);
            
            // 逐字比對
            if (inputVal.length > matchCount) {
                let lastChar = inputVal[inputVal.length - 1];
                let targetChar = toHiragana(targetKana[matchCount]);

                if (lastChar === targetChar) {
                    // 打對了：發射子彈
                    fireBullet(targetKana[matchCount], matchCount);
                    matchCount++;
                    
                    // 更新畫面的當前目標狀態
                    document.querySelectorAll('.kana-char').forEach((s, idx) => {
                        if (idx < matchCount) s.className = 'kana-char correct';
                        else if (idx === matchCount) s.className = 'kana-char active';
                    });

                    if (matchCount === targetKana.length) {
                        clearAndExplode();
                    } else {
                        updateFlickHint();
                    }
                } else {
                    // 打錯了：震動
                    const errorSpan = document.getElementById(`char-${matchCount}`);
                    errorSpan.classList.remove('shake');
                    void errorSpan.offsetWidth;
                    errorSpan.classList.add('shake');
                }
                // 始終保持 input value 為已匹配的部分，強制玩家重新輸入下一個字
                hiddenInput.value = targetKana.substring(0, matchCount);
            }
        });

        function fireBullet(char, idx) {
            const bullet = document.createElement('div');
            bullet.className = 'bullet';
            bullet.textContent = char;
            const startY = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            bullet.style.left = '50%'; bullet.style.top = startY + 'px';
            document.body.appendChild(bullet);

            const rect = document.getElementById(`char-${idx}`).getBoundingClientRect();
            void bullet.offsetWidth;
            bullet.style.left = (rect.left + rect.width/2) + 'px';
            bullet.style.top = (rect.top + rect.height/2) + 'px';
            bullet.style.opacity = '0';
            setTimeout(() => bullet.remove(), 150);
        }

        function clearAndExplode() {
            clearInterval(timerInterval);
            document.getElementById('word-container').className = 'exploding';
            setTimeout(nextWord, 400);
        }

        function nextWord() {
            document.getElementById('answer-overlay').style.display = 'none';
            document.getElementById('word-container').className = 'approaching';
            hiddenInput.value = ''; matchCount = 0;
            hiddenInput.focus();

            currentWordIndex = Math.floor(Math.random() * vocabulary.length);
            const word = vocabulary[currentWordIndex];
            targetKana = word.reading;

            document.getElementById('kanji-display').textContent = word.kanji;
            kanaDisplay.innerHTML = targetKana.split('').map((c, i) => 
                `<span id="char-${i}" class="kana-char ${i===0?'active':''}">${c}</span>`
            ).join('');

            updateFlickHint();

            timeLeft = 12;
            updateTimerBar();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerBar();
                if (timeLeft <= 0) showAnswer();
            }, 1000);
        }

        function updateTimerBar() {
            const p = (timeLeft / 12) * 100;
            document.getElementById('timer-bar').style.width = p + '%';
            document.getElementById('timer-bar').style.backgroundColor = p < 30 ? '#ff4444' : '#00FF00';
        }

        function showAnswer() {
            clearInterval(timerInterval);
            document.getElementById('word-container').className = '';
            document.getElementById('answer-detail').innerHTML = `正確讀音：<b style="color:#00FF00">${targetKana}</b>`;
            document.getElementById('answer-overlay').style.display = 'flex';
            hiddenInput.blur();
        }

        resizeLayout();
    </script>
</body>
</html>
