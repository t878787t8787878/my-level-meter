<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日文滑動鍵盤極限特訓</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #111; color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column;
            height: 100vh;
        }

        #game-screen {
            flex: 1; position: relative;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, #2a2a35 0%, #000 100%);
            overflow: hidden; perspective: 1000px;
        }

        /* 漢字與上方假名提示的排版 */
        #word-container {
            position: absolute;
            font-size: 5rem;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 3px 3px 6px #000;
            transform: scale(0.1) translateZ(-500px);
            opacity: 0;
            text-align: center;
        }

        ruby { ruby-align: center; }
        rt { 
            font-size: 2rem; 
            color: #00FFFF; /* 提示字用亮藍色區分 */
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8), 2px 2px 4px #000;
            transform: translateY(-10px);
        }

        .approaching { animation: zoomIn 10s linear forwards; }

        @keyframes zoomIn {
            0% { transform: scale(0.1) translateZ(-500px); opacity: 0; }
            10% { opacity: 1; }
            90% { transform: scale(2.2) translateZ(100px); opacity: 1; }
            100% { transform: scale(2.5) translateZ(200px); opacity: 0; }
        }

        #timer-bar-container { width: 100%; height: 12px; background-color: #333; }
        #timer-bar { height: 100%; width: 100%; background-color: #00FF00; transition: width 1s linear, background-color 0.5s; }

        #ui-area {
            height: 25vh; /* 縮小UI區域，留空間給手機彈出鍵盤 */
            background-color: #222;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 15px; box-sizing: border-box;
            border-top: 2px solid #444;
        }

        #player-input {
            width: 90%; max-width: 400px;
            font-size: 2rem; text-align: center;
            padding: 15px; border-radius: 10px;
            border: 3px solid #555; background-color: #fff;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            transition: border-color 0.2s;
        }
        
        #player-input:focus { outline: none; border-color: #FFD700; }

        #answer-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 10;
        }

        #answer-text { font-size: 3rem; color: #fff; margin-bottom: 30px; text-align: center; }
        button { padding: 15px 30px; font-size: 1.5rem; border: none; border-radius: 8px; background-color: #E50914; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        button:active { transform: translateY(2px); box-shadow: none; }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="word-container">準備</div>
        <div id="answer-overlay">
            <div id="answer-text">解答: --</div>
            <button onclick="nextWord()">下一題</button>
        </div>
    </div>

    <div id="timer-bar-container"><div id="timer-bar"></div></div>

    <div id="ui-area">
        <input type="text" id="player-input" placeholder="點此輸入..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>

    <script>
        // 題庫 (結合了旅遊、車站、滑雪與解謎常見字彙)
        const vocabulary = [
            { kanji: "東京", reading: "とうきょう" },
            { kanji: "地下鉄", reading: "ちかてつ" },
            { kanji: "荷物", reading: "にもつ" },
            { kanji: "苗場", reading: "なえば" },
            { kanji: "滑雪", reading: "スキー" },
            { kanji: "謎解き", reading: "なぞとき" },
            { kanji: "迷宮", reading: "めいきゅう" },
            { kanji: "暗號", reading: "あんごう" },
            { kanji: "改札口", reading: "かいさつぐち" },
            { kanji: "切符", reading: "きっぷ" }
        ];

        let currentWordIndex = -1;
        let timerInterval;
        let timeLeft = 10;

        const wordContainer = document.getElementById('word-container');
        const timerBar = document.getElementById('timer-bar');
        const answerOverlay = document.getElementById('answer-overlay');
        const answerText = document.getElementById('answer-text');
        const playerInput = document.getElementById('player-input');

        // ★ 核心功能：將字串中的「片假名」全部轉換為「平假名」
        function toHiragana(str) {
            return str.replace(/[\u30a1-\u30f6]/g, function(match) {
                // 利用 Unicode 編碼差距，片假名 - 0x60 就會變成平假名
                var chr = match.charCodeAt(0) - 0x60;
                return String.fromCharCode(chr);
            });
        }

        // 監聽輸入框變化 (即時判定)
        playerInput.addEventListener('input', function() {
            if (currentWordIndex === -1) return; // 遊戲還沒開始
            
            const targetAnswer = vocabulary[currentWordIndex].reading;
            const currentInput = playerInput.value.trim();

            // 將答案與輸入都轉成平假名來比對 (這樣打 スキー 或 すきー 都算對)
            if (toHiragana(currentInput) === toHiragana(targetAnswer)) {
                // 答對了！直接進下一題
                playerInput.style.backgroundColor = "#c8e6c9"; // 閃一下綠色
                setTimeout(() => {
                    playerInput.style.backgroundColor = "#fff";
                    nextWord();
                }, 200);
            }
        });

        // 遊戲邏輯
        function startGame() { nextWord(); }

        function nextWord() {
            answerOverlay.style.display = 'none';
            playerInput.value = ''; // 清空輸入框
            playerInput.focus();    // 自動對焦，保持鍵盤開啟
            
            currentWordIndex = Math.floor(Math.random() * vocabulary.length);
            const currentObj = vocabulary[currentWordIndex];
            
            // 組合帶有假名提示的 HTML
            wordContainer.innerHTML = `<ruby>${currentObj.kanji}<rt>${currentObj.reading}</rt></ruby>`;
            
            wordContainer.classList.remove('approaching');
            void wordContainer.offsetWidth; // 觸發 reflow 重新播放動畫
            wordContainer.classList.add('approaching');

            timeLeft = 10;
            updateTimerBar();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerBar();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showAnswer();
                }
            }, 1000);
        }

        function updateTimerBar() {
            const percentage = (timeLeft / 10) * 100;
            timerBar.style.width = percentage + '%';
            if (timeLeft > 5) timerBar.style.backgroundColor = '#00FF00';
            else if (timeLeft > 2) timerBar.style.backgroundColor = '#FFA500';
            else timerBar.style.backgroundColor = '#FF0000';
        }

        function showAnswer() {
            clearInterval(timerInterval);
            wordContainer.classList.remove('approaching');
            const currentObj = vocabulary[currentWordIndex];
            answerText.innerHTML = `時間到！<br>正解: ${currentObj.reading}`;
            answerOverlay.style.display = 'flex';
            playerInput.blur(); // 收起鍵盤
        }

        // 畫面載入後 1 秒開始
        setTimeout(startGame, 1000);
    </script>
</body>
</html>
